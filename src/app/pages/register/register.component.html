<div class="register-wrapper">
    <div class="register-container">
      <h2>Register</h2>
      <form (submit)="register()">
        <div class="input-group">
          <input type="text" placeholder="Username" [(ngModel)]="user.name" name="username" required />
        </div>
        <div class="input-group">
          <input type="email" placeholder="Email" [(ngModel)]="user.email" name="email" required />
        </div>
        <div class="input-group">
          <input type="password" placeholder="Password" [(ngModel)]="user.password" name="password" required />
        </div>
        <button type="submit" class="register-button">Register</button>
        <p class="login-text">Already have an account? <a href="#">Login</a></p>
      </form>
    </div>
  </div>
